<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title th:text="${team.name} + ' ' + (${team.mascot} ?: '')">Team</title>
</head>
<body>

<main layout:fragment="content"
      th:data-team-id="${teamId}"
      th:data-season-year="${currentSeasonYear}">

    <!-- Team header -->
    <div class="team-hero">
        <div class="team-hero__logo-wrap"
             th:if="${team.logoUrl}"
             th:style="'background-color: #' + ${team.logoBackgroundColor}">
            <img th:src="${team.effectiveLogoUrl}" th:alt="${team.name}" class="team-hero__logo" />
        </div>
        <div class="team-hero__info">
            <h1 class="team-hero__name" th:text="${team.name}">Alabama</h1>
            <p class="team-hero__mascot" th:text="${team.mascot}">Crimson Tide</p>
            <div class="team-hero__meta">
                <a th:if="${currentConference}" class="team-hero__conference"
                   th:href="@{'/conferences/' + ${currentConference.id}}"
                   th:text="${currentConferenceName}">SEC</a>
                <a th:if="${team.espnId}" class="team-hero__espn-link"
                   th:href="'https://www.espn.com/mens-college-basketball/team/_/id/' + ${team.espnId} + '/' + (${team.slug} ?: '')"
                   target="_blank" rel="noopener">ESPN</a>
            </div>
        </div>
    </div>

    <!-- View tabs: Schedule | Team Profile -->
    <nav class="team-tabs" th:if="${!seasons.isEmpty()}">
        <button class="team-tabs__tab team-tabs__tab--active" type="button" data-tab="schedule">Schedule</button>
        <button th:if="${statPanel != null}" class="team-tabs__tab" type="button" data-tab="stats">Team Statistics</button>
    </nav>

    <!-- Schedule tab -->
    <div id="tab-schedule" class="team-tab-panel schedule-section" th:if="${!seasons.isEmpty()}">

        <!-- Season tabs -->
        <div class="season-tabs">
            <button th:each="season : ${seasons}"
                    class="season-tabs__tab"
                    th:classappend="${season.year == currentSeasonYear} ? 'season-tabs__tab--active'"
                    th:data-season="${season.year}"
                    th:hx-get="@{'/teams/' + ${teamId} + '/season/' + ${season.year}}"
                    hx-target="#season-content"
                    hx-swap="innerHTML"
                    th:text="${season.year}">2026</button>
        </div>

        <!-- Season content (current season pre-loaded; others loaded on demand via HTMX) -->
        <div id="season-content">
            <div th:replace="~{fragments/team-season :: season-panel}"></div>
        </div>
    </div>

    <div th:if="${seasons.isEmpty()}" class="teams-empty">
        No games found for this team.
    </div>

    <!-- Team Profile tab (box-score analytics) -->
    <section id="tab-stats" class="team-tab-panel team-stats" th:if="${statPanel != null}" hidden
             th:data-team-id="${teamId}"
             th:data-season-year="${currentSeasonYear}">
        <div class="team-stats__header">
            <div class="analytics-season-tabs">
                <span th:each="season : ${seasons}"
                      class="analytics-tab"
                      th:classappend="${season.year == currentSeasonYear} ? 'analytics-tab--active'"
                      th:data-year="${season.year}"
                      th:text="${season.year}">2026</span>
            </div>
        </div>

        <div id="team-stats-panel">
            <div th:replace="~{fragments/team-stat-panel :: panel}"></div>
        </div>
    </section>

</main>

<th:block layout:fragment="scripts">
<script>
// Team Statistics — season switching swaps the stat panel fragment in place.
(function () {
    const section = document.querySelector('.team-stats');
    if (!section) return;

    const teamId = section.dataset.teamId;
    if (!teamId) return;

    const panelEl = document.getElementById('team-stats-panel');

    section.querySelectorAll('.analytics-tab').forEach(tab => {
        tab.addEventListener('click', function () {
            const year = this.dataset.year;
            section.querySelectorAll('.analytics-tab').forEach(t => t.classList.remove('analytics-tab--active'));
            this.classList.add('analytics-tab--active');
            fetch('/teams/' + teamId + '/season/' + year + '/stats-panel')
                .then(r => r.ok ? r.text() : '')
                .then(html => { if (html) panelEl.innerHTML = html; })
                .catch(() => {});
        });
    });
})();
</script>
<script>
// Top-level Schedule / Team Profile tab switching.
(function () {
    const tabBar = document.querySelector('.team-tabs');
    if (!tabBar) return;

    const buttons = tabBar.querySelectorAll('.team-tabs__tab');
    const panels = {
        schedule: document.getElementById('tab-schedule'),
        stats: document.getElementById('tab-stats')
    };
    const statsSection = document.getElementById('tab-stats');

    function activate(name) {
        buttons.forEach(b => b.classList.toggle('team-tabs__tab--active', b.dataset.tab === name));
        Object.keys(panels).forEach(k => { if (panels[k]) panels[k].hidden = (k !== name); });
        if (name === 'stats' && statsSection) {
            statsSection.dispatchEvent(new CustomEvent('team-stats:shown'));
        }
    }

    buttons.forEach(b => b.addEventListener('click', () => activate(b.dataset.tab)));
})();
</script>
<script>
(function () {
    function enrichPredictions(container) {
        const rows = container ? container.querySelectorAll('tr[data-game-id]')
                               : document.querySelectorAll('tr[data-game-id]');
        const upcoming = [];
        rows.forEach(function (row) {
            // Only enrich rows that show a time (SCHEDULED, no score yet)
            if (row.querySelector('.schedule-table__time')) {
                upcoming.push(row);
            }
        });
        if (!upcoming.length) return;

        Promise.all(upcoming.map(function (row) {
            const id = row.dataset.gameId;
            return fetch('/api/predictions/game/' + id)
                .then(function (r) { return r.ok ? r.json() : null; })
                .then(function (data) { return { row: row, data: data }; })
                .catch(function () { return null; });
        })).then(function (results) {
            results.forEach(function (item) {
                if (!item || !item.data) return;
                const p = item.data;
                const row = item.row;

                const spreadCell = row.querySelector('.schedule-table__spread');
                const ouCell = row.querySelector('.schedule-table__ou');

                const spread = p.ml ? p.ml.spread : (p.massey ? p.massey.spread : null);
                const total  = p.ml ? p.ml.total  : (p.masseyTotal ? p.masseyTotal.total : null);

                if (spread != null && spreadCell) {
                    const absSpread = Math.abs(spread).toFixed(1);
                    const favAbbr = spread >= 0
                        ? (p.homeTeam ? p.homeTeam.abbreviation : '?')
                        : (p.awayTeam ? p.awayTeam.abbreviation : '?');
                    const modelLine = document.createElement('div');
                    modelLine.style.cssText = 'font-size:0.75rem; color:var(--color-text-muted); margin-top:2px;';
                    modelLine.textContent = '~ ' + favAbbr + ' -' + absSpread;
                    spreadCell.appendChild(modelLine);
                }

                if (total != null && ouCell) {
                    const modelOu = document.createElement('div');
                    modelOu.style.cssText = 'font-size:0.75rem; color:var(--color-text-muted); margin-top:2px;';
                    modelOu.textContent = '~ ' + total.toFixed(1);
                    ouCell.appendChild(modelOu);
                }
            });
        });
    }

    // Enrich on initial load
    enrichPredictions(document.querySelector('#season-content'));

    // Re-enrich after HTMX season tab swaps
    document.body.addEventListener('htmx:afterSwap', function (evt) {
        if (evt.detail && evt.detail.target && evt.detail.target.id === 'season-content') {
            enrichPredictions(evt.detail.target);
        }
    });
})();
</script>
</th:block>

</body>
</html>
