<!DOCTYPE html>
<html lang="en"
      th:attr="data-theme=${isAdminPage ? 'dark' : null}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - DeepFij">DeepFij</title>
    <link rel="icon" type="image/png" th:href="@{/img/deepfij.png}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body hx-boost="true">

    <header class="site-header" th:replace="~{fragments/nav :: nav}"></header>

    <div class="quote-banner" th:if="${randomQuote != null}">
        <span class="quote-banner__text" th:text="${randomQuote.quoteText}"></span>
        <span class="quote-banner__attribution" th:text="${randomQuote.attribution}"></span>
    </div>

    <main layout:fragment="content">
        <p>Page content goes here.</p>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script th:src="@{/js/app.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
