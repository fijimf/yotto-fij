<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Change Password</title>
</head>
<body>
<main layout:fragment="content">
    <div class="auth-container">
        <div class="auth-card card">
            <h1 class="auth-card__title">Change Password</h1>

            <div th:if="${mustChange}" class="alert alert--warning">
                You must change your password before continuing.
            </div>

            <div th:if="${error}" class="alert alert--danger" th:text="${error}"></div>

            <form th:action="@{/account/password}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="currentPassword" class="form-label">Current password</label>
                    <input type="password" id="currentPassword" name="currentPassword"
                           class="form-input" required autofocus autocomplete="current-password"/>
                </div>

                <div class="form-group">
                    <label for="newPassword" class="form-label">New password</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-input" required minlength="8" maxlength="64"
                           autocomplete="new-password"/>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm new password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-input" required autocomplete="new-password"/>
                </div>

                <button type="submit" class="btn btn--primary btn--full">Change Password</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
