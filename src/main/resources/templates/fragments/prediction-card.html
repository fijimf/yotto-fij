<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- One prediction card, driven by a PredictionCardView `v`. -->
<div th:fragment="card(v)" class="prediction-card card"
     th:classappend="${v.isFinal()} ? ' prediction-card--final'">

    <!-- Teams + donut row -->
    <div class="prediction-card__teams"
         th:with="pHome=${v.predHomeWinProb},
                  hColor=${v.homeTeam.color ?: '4a90d9'},
                  aColor=${v.awayTeam.color ?: '6b7280'}">

        <div class="prediction-card__team-stack">
            <!-- Home -->
            <a th:href="@{'/teams/' + ${v.homeTeam.id}}" class="prediction-card__team-row"
               th:classappend="${v.isFinal() and v.homeWon()} ? ' prediction-card__team-row--won'">
                <img th:if="${v.homeTeam.logoUrl}" th:src="${v.homeTeam.logoUrl}"
                     class="prediction-card__logo" loading="lazy" width="24" height="24" alt="" />
                <span class="prediction-card__team-name" th:text="${v.homeTeam.name}">Duke</span>
                <span th:if="${v.isFinal()}" class="prediction-card__score" th:text="${v.homeScore}">78</span>
                <span th:if="${!v.isFinal() and pHome != null}" class="prediction-card__prob-pct"
                      th:style="'color:#' + ${hColor}"
                      th:text="${#numbers.formatDecimal(pHome * 100, 1, 0)} + '%'">65%</span>
            </a>
            <div class="prediction-card__vs">vs</div>
            <!-- Away -->
            <a th:href="@{'/teams/' + ${v.awayTeam.id}}" class="prediction-card__team-row"
               th:classappend="${v.isFinal() and !v.homeWon()} ? ' prediction-card__team-row--won'">
                <img th:if="${v.awayTeam.logoUrl}" th:src="${v.awayTeam.logoUrl}"
                     class="prediction-card__logo" loading="lazy" width="24" height="24" alt="" />
                <span class="prediction-card__team-name" th:text="${v.awayTeam.name}">UNC</span>
                <span th:if="${v.isFinal()}" class="prediction-card__score" th:text="${v.awayScore}">71</span>
                <span th:if="${!v.isFinal() and pHome != null}" class="prediction-card__prob-pct"
                      th:style="'color:#' + ${aColor}"
                      th:text="${#numbers.formatDecimal((1.0 - pHome) * 100, 1, 0)} + '%'">35%</span>
            </a>
        </div>

        <!-- Donut win-prob chart (r=15.9155 → circumference≈100, so dasharray values = percentages) -->
        <div th:if="${pHome != null}" class="prob-donut"
             th:with="hp=${#numbers.formatDecimal(pHome * 100, 1, 0)},
                      ap=${#numbers.formatDecimal((1.0 - pHome) * 100, 1, 0)},
                      favLogo=${pHome >= 0.5 ? v.homeTeam.logoUrl : v.awayTeam.logoUrl}">
            <svg viewBox="0 0 40 40" class="prob-donut__svg"
                 th:style="'--dh:#' + ${hColor} + ';--da:#' + ${aColor}">
                <circle class="prob-donut__track" cx="20" cy="20" r="15.9155"/>
                <circle class="prob-donut__arc" cx="20" cy="20" r="15.9155"
                        th:attr="stroke-dasharray=${hp + ' ' + ap}"/>
            </svg>
            <img th:if="${favLogo}" th:src="${favLogo}"
                 class="prob-donut__logo" loading="lazy" width="26" height="26" alt=""/>
        </div>
        <div th:unless="${pHome != null}" class="prob-donut prob-donut--empty"><span>—</span></div>
    </div>

    <!-- Predicted stats row -->
    <div class="prediction-card__stats">
        <!-- Predicted spread -->
        <div class="prediction-card__stat">
            <span class="prediction-card__stat-label">Pred. Spread</span>
            <span th:if="${v.predSpread != null}"
                  th:with="absSpread=${v.predSpread >= 0 ? v.predSpread : -v.predSpread},
                           favAbbr=${v.predSpread >= 0 ? v.homeTeam.abbreviation : v.awayTeam.abbreviation}">
                <span class="prediction-card__stat-value"
                      th:text="${favAbbr + ' -' + #numbers.formatDecimal(absSpread, 1, 1)}">Duke -3.2</span>
            </span>
            <span th:unless="${v.predSpread != null}"
                  class="prediction-card__stat-value prediction-card__stat-value--empty">—</span>
        </div>

        <!-- Predicted total -->
        <div class="prediction-card__stat">
            <span class="prediction-card__stat-label">Pred. Total</span>
            <span th:if="${v.predTotal != null}" class="prediction-card__stat-value"
                  th:text="${#numbers.formatDecimal(v.predTotal, 3, 1)}">148.4</span>
            <span th:unless="${v.predTotal != null}"
                  class="prediction-card__stat-value prediction-card__stat-value--empty">—</span>
        </div>

        <!-- Detail link -->
        <a th:href="@{'/games/' + ${v.gameId}}" class="btn btn--outline btn--sm prediction-card__detail-btn">Details</a>
    </div>

    <!-- Result grading (FINAL games only) -->
    <div th:if="${v.isFinal()}" class="prediction-card__result">
        <span class="prediction-card__result-final">Final ·
            <strong th:text="${v.homeScore + '–' + v.awayScore}">78–71</strong></span>

        <span th:if="${v.winnerCorrect() != null}" class="pred-check"
              th:classappend="${v.winnerCorrect()} ? ' pred-check--ok' : ' pred-check--miss'">
            <span th:text="${v.winnerCorrect()} ? '✓' : '✗'">✓</span> Winner
        </span>

        <span th:if="${v.spreadCorrect() != null}" class="pred-check"
              th:classappend="${v.spreadCorrect()} ? ' pred-check--ok' : ' pred-check--miss'">
            <span th:text="${v.spreadCorrect()} ? '✓' : '✗'">✓</span> Spread
            <span class="pred-check__detail"
                  th:text="'(pred ' + ${#numbers.formatDecimal(v.predSpread, 1, 1)} + ', actual ' + ${v.actualMargin()} + ')'"></span>
        </span>

        <span th:if="${v.predTotal != null}" class="pred-check"
              th:classappend="${v.totalCorrect() != null} ? (${v.totalCorrect()} ? ' pred-check--ok' : ' pred-check--miss') : ' pred-check--neutral'">
            <span th:if="${v.totalCorrect() != null}" th:text="${v.totalCorrect()} ? '✓' : '✗'">✓</span> Total
            <span class="pred-check__detail"
                  th:text="'(pred ' + ${#numbers.formatDecimal(v.predTotal, 3, 1)} + ', actual ' + ${v.actualTotal()} + ')'"></span>
        </span>
    </div>

    <!-- Book lines row (if available) -->
    <div th:if="${v.bookSpread != null or v.bookOverUnder != null}" class="prediction-card__book-odds">
        <span class="prediction-card__stat-label">Book:</span>

        <span th:if="${v.bookSpread != null}">
            Spread <strong th:text="${v.bookSpread}">-2.5</strong>
            <!-- Book spread is a handicap (negative = home favored); model spread is a home margin —
                 the book's implied margin is −bookSpread, so edge = model + book -->
            <th:block th:if="${v.predSpread != null}"
                      th:with="edge=${v.predSpread + v.bookSpread.doubleValue()}">
                <span th:if="${edge >= 2.5 or edge <= -2.5}" class="edge-chip edge-chip--high"
                      th:text="${edge > 0 ? '▲' : '▼'}"></span>
                <span th:if="${(edge >= 1.0 and edge < 2.5) or (edge <= -1.0 and edge > -2.5)}"
                      class="edge-chip edge-chip--low" th:text="${edge > 0 ? '▲' : '▼'}"></span>
            </th:block>
        </span>

        <span th:if="${v.bookOverUnder != null}">&nbsp;·&nbsp;O/U <strong th:text="${v.bookOverUnder}">147.5</strong></span>
    </div>

</div>
</body>
</html>
