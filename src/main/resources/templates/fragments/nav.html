<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header class="site-header" th:fragment="nav">
    <nav class="nav">
        <a class="nav__brand" th:href="@{/}">
            <img th:src="@{/img/deepfij.png}" alt="DeepFIJ" class="nav__logo" />
            DeepFij
        </a>
        <button class="nav__toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav__links">
            <li><a class="nav__link" th:href="@{/}" th:classappend="${#strings.equals(currentPage, 'home')} ? 'nav__link--active'">Home</a></li>
            <li><a class="nav__link" th:href="@{/teams}" th:classappend="${#strings.equals(currentPage, 'teams')} ? 'nav__link--active'">Teams</a></li>
            <li><a class="nav__link" th:href="@{/conferences}" th:classappend="${#strings.equals(currentPage, 'conferences')} ? 'nav__link--active'">Conferences</a></li>
            <li><a class="nav__link" th:href="@{/games}" th:classappend="${#strings.equals(currentPage, 'games')} ? 'nav__link--active'">Games</a></li>
            <li><a class="nav__link" th:href="@{/seasons}" th:classappend="${#strings.equals(currentPage, 'seasons')} ? 'nav__link--active'">Seasons</a></li>
            <li><a class="nav__link" th:href="@{/rankings}" th:classappend="${#strings.equals(currentPage, 'rankings')} ? 'nav__link--active'">Rankings</a></li>
            <li><a class="nav__link" th:href="@{/rankings/comprehensive}" th:classappend="${#strings.equals(currentPage, 'comprehensive-rankings')} ? 'nav__link--active'">Comp. Rankings</a></li>
            <li><a class="nav__link" th:href="@{/predictions}" th:classappend="${#strings.equals(currentPage, 'predictions')} ? 'nav__link--active'">Predictions</a></li>
            <li><a class="nav__link" th:href="@{/predictions/matchup}" th:classappend="${#strings.equals(currentPage, 'matchup')} ? 'nav__link--active'">Matchup</a></li>
        </ul>
    </nav>
</header>

</body>
</html>
