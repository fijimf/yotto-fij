<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header class="site-header" th:fragment="nav">
    <nav class="nav">
        <a class="nav__brand" th:href="@{/}">
            <img th:src="@{/img/deepfij.png}" alt="DeepFIJ" class="nav__logo" />
            DeepFij
        </a>
        <button class="nav__toggle" aria-label="Toggle navigation">&#9776;</button>
        <ul class="nav__links">
            <li><a class="nav__link" th:href="@{/}" th:classappend="${#strings.equals(currentPage, 'home')} ? 'nav__link--active'">Home</a></li>
            <li><a class="nav__link" th:href="@{/teams}" th:classappend="${#strings.equals(currentPage, 'teams')} ? 'nav__link--active'">Teams</a></li>
            <li><a class="nav__link" th:href="@{/conferences}" th:classappend="${#strings.equals(currentPage, 'conferences')} ? 'nav__link--active'">Conferences</a></li>
            <li><a class="nav__link" th:href="@{/games}" th:classappend="${#strings.equals(currentPage, 'games')} ? 'nav__link--active'">Games</a></li>
            <li><a class="nav__link" th:href="@{/seasons/stats}" th:classappend="${#strings.equals(currentPage, 'seasons')} ? 'nav__link--active'">Season Stats</a></li>
            <li><a class="nav__link" th:href="@{/rankings}" th:classappend="${#strings.equals(currentPage, 'rankings')} ? 'nav__link--active'">Rankings</a></li>
            <li th:if="${#dates.month(#dates.createNow()) >= 3 and #dates.month(#dates.createNow()) <= 11}">
                <a class="nav__link" th:href="@{/bracket}" th:classappend="${#strings.equals(currentPage, 'bracket')} ? 'nav__link--active'">Bracket</a>
            </li>
            <li><a class="nav__link" th:href="@{/predictions}" th:classappend="${#strings.equals(currentPage, 'predictions')} ? 'nav__link--active'">Predictions</a></li>
            <li><a class="nav__link" th:href="@{/predictions/matchup}" th:classappend="${#strings.equals(currentPage, 'matchup')} ? 'nav__link--active'">Matchup</a></li>
            <li class="nav__spacer" aria-hidden="true"></li>
            <li sec:authorize="hasRole('ADMIN')">
                <a class="nav__link" th:href="@{/admin}">Admin</a>
            </li>
            <li class="nav__dropdown" sec:authorize="isAuthenticated()">
                <button type="button" class="nav__link nav__link--button nav__dropdown-toggle"
                        aria-haspopup="true" aria-expanded="false">
                    <span sec:authentication="name">user</span><span class="nav__dropdown-caret">&#9662;</span>
                </button>
                <ul class="nav__dropdown-menu">
                    <li><a class="nav__dropdown-item" th:href="@{/account}">Profile</a></li>
                    <li>
                        <!-- hx-boost off: boosted AJAX logout gets a 204 from Spring
                             Security and the page never visibly changes -->
                        <form th:action="@{/logout}" method="post" hx-boost="false">
                            <button type="submit" class="nav__dropdown-item">Sign out</button>
                        </form>
                    </li>
                </ul>
            </li>
            <li sec:authorize="!isAuthenticated()">
                <a class="nav__link" th:href="@{/login}">Sign in</a>
            </li>
        </ul>
    </nav>
</header>

</body>
</html>
