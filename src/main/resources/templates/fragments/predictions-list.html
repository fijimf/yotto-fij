<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="predictions-list">

    <!-- Empty state -->
    <div th:if="${!page.hasResults() and !page.hasUpcoming()}"
         class="card" style="text-align: center; color: var(--color-text-muted); padding: 3rem 1rem;">
        No games found around <span th:text="${#temporals.format(page.refDate, 'MMMM d, yyyy')}">this date</span>.
        Try a different date or a wider window.
    </div>

    <!-- Recent results (completed games, pre-game prediction vs actual) -->
    <section th:if="${page.hasResults()}" class="predictions-section">
        <h2 class="predictions-section-title">Recent Results</h2>
        <div th:each="entry : ${page.resultsByDate}" class="predictions-date-group">
            <h3 class="predictions-date-header"
                th:text="${#temporals.format(entry.key, 'EEEE, MMMM d')}">Saturday, March 8</h3>
            <div class="predictions-games">
                <th:block th:each="v : ${entry.value}">
                    <div th:replace="~{fragments/prediction-card :: card(v=${v})}"></div>
                </th:block>
            </div>
        </div>
    </section>

    <!-- Upcoming games (predictions only) -->
    <section th:if="${page.hasUpcoming()}" class="predictions-section">
        <h2 class="predictions-section-title">
            Upcoming <span class="predictions-section-sub" th:text="'· next ' + ${page.days} + ' days'">· next 7 days</span>
        </h2>
        <div th:each="entry : ${page.upcomingByDate}" class="predictions-date-group">
            <h3 class="predictions-date-header"
                th:text="${#temporals.format(entry.key, 'EEEE, MMMM d')}">Saturday, March 8</h3>
            <div class="predictions-games">
                <th:block th:each="v : ${entry.value}">
                    <div th:replace="~{fragments/prediction-card :: card(v=${v})}"></div>
                </th:block>
            </div>
        </div>
    </section>

</div>
</body>
</html>
