<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="panel">

    <div th:if="${statPanel == null}" class="teams-empty">
        No box-score analytics for this season yet.
    </div>

    <th:block th:if="${statPanel != null}">
        <p class="team-stats__asof"
           th:text="'Through ' + ${statPanel.gamesPlayed} + ' games · as of ' + ${statPanel.asOfDate}">
            Through 22 games · as of 2026-02-26</p>

        <div class="stat-group" th:each="group : ${statPanel.groups}">
            <h3 class="stat-group__header" th:text="${group.header}">Shooting</h3>
            <div class="stat-grid">
                <div class="stat-grid__row" th:each="row : ${group.rows}"
                     th:data-stat="${row.statName}"
                     th:data-label="${row.label}"
                     th:data-format="${row.formatName}">
                    <span class="stat-grid__label" th:text="${row.label}">True Shooting%</span>
                    <span class="stat-grid__value" th:text="${row.formattedValue}">53.2%</span>
                    <span class="stat-grid__rank" th:text="${row.rankDisplay()}">#42 of 363</span>
                    <div class="stat-bar" th:if="${row.percentile != null}"
                         th:title="${row.zscore != null} ? 'z = ' + ${#numbers.formatDecimal(row.zscore, 1, 2)} : null">
                        <div th:class="${row.barFillClass()}"
                             th:style="'width:' + ${row.percentile} + '%'"></div>
                    </div>
                    <div class="stat-bar stat-bar--empty" th:if="${row.percentile == null}"></div>
                </div>
            </div>
        </div>
    </th:block>

</div>
</body>
</html>
