<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Link No Longer Valid</title>
</head>
<body>
<main layout:fragment="content">
    <div class="auth-container">
        <div class="auth-card card">
            <h1 class="auth-card__title">This link is no longer valid</h1>
            <p>The link may have expired, already been used, or been replaced by a newer one.</p>

            <p style="font-weight: 600; margin-bottom: 0.25rem;">Need a new confirmation email?</p>
            <form th:action="@{/verify/resend}" method="post">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-input" required/>
                </div>
                <button type="submit" class="btn btn--outline btn--sm">Resend confirmation</button>
            </form>

            <p style="margin-top: 1.25rem; font-size: 0.9rem;">
                Trying to reset your password? <a th:href="@{/forgot-password}">Request a new reset link</a>.
            </p>
        </div>
    </div>
</main>
</body>
</html>
