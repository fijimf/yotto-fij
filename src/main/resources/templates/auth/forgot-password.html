<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>Forgot Password</title>
</head>
<body>
<main layout:fragment="content">
    <div class="auth-container">
        <div class="auth-card card">
            <h1 class="auth-card__title">Forgot your password?</h1>
            <p>Enter your email address and we'll send a reset link.</p>
            <form th:action="@{/forgot-password}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" id="email" name="email" class="form-input" required autofocus/>
                </div>
                <button type="submit" class="btn btn--primary btn--full">Send reset link</button>
            </form>
            <p style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
                <a th:href="@{/login}">Back to sign in</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
