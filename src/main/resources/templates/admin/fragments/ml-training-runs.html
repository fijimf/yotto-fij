<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="training-runs" id="ml-training-runs-table">
    <p th:if="${#lists.isEmpty(trainingRuns)}"
       style="font-size: 0.85rem; color: var(--color-text-muted); margin: 0;">
        No training runs yet — click Train Models to start one.
    </p>

    <table th:if="${!#lists.isEmpty(trainingRuns)}">
        <thead>
        <tr>
            <th style="text-align: left;">Started</th>
            <th style="text-align: left;">Seasons</th>
            <th style="text-align: left;">Status</th>
            <th style="text-align: right;">Duration</th>
            <th style="text-align: left;">Result</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${trainingRuns}" th:with="r=${v.run}">
            <td th:text="${#temporals.format(r.startedAt, 'MMM d HH:mm')}">Jul 10 14:02</td>
            <td>
                <span th:text="${r.trainSeasons ?: '—'}">2024,2025</span>
                <span th:if="${r.testSeason != null}" style="color: var(--color-text-muted);"
                      th:text="'(test ' + ${r.testSeason} + ')'"></span>
            </td>
            <td>
                <span th:if="${r.status.name() == 'RUNNING'}"
                      style="display: inline-block; padding: 2px 10px; border-radius: 12px;
                             background: #fef3c7; color: #92400e; font-size: 0.75rem; font-weight: 600;">
                    Running
                </span>
                <span th:if="${r.status.name() == 'COMPLETED'}"
                      style="display: inline-block; padding: 2px 10px; border-radius: 12px;
                             background: #d1fae5; color: #065f46; font-size: 0.75rem; font-weight: 600;">
                    Completed
                </span>
                <span th:if="${r.status.name() == 'FAILED'}"
                      style="display: inline-block; padding: 2px 10px; border-radius: 12px;
                             background: #fee2e2; color: #991b1b; font-size: 0.75rem; font-weight: 600;">
                    Failed
                </span>
            </td>
            <td style="text-align: right;" th:text="${v.duration}">4m 12s</td>
            <td>
                <th:block th:if="${r.status.name() == 'COMPLETED'}">
                    <span th:if="${v.spreadRmse != null}"
                          th:text="'Spread ' + ${#numbers.formatDecimal(v.spreadRmse, 1, 2)} + ' RMSE'">Spread 10.50 RMSE</span>
                    <span th:if="${v.brierScore != null}" style="color: var(--color-text-muted);"
                          th:text="'· Brier ' + ${#numbers.formatDecimal(v.brierScore, 1, 4)}"></span>
                    <span th:if="${r.reloaded}" title="Models hot-reloaded and evaluation refreshed"
                          style="color: #065f46;">✓ live</span>
                </th:block>
                <span th:if="${r.status.name() == 'FAILED'}"
                      style="color: #991b1b;" th:text="${r.errorMessage ?: 'failed'}">failed</span>
                <details th:if="${r.logTail != null and !#strings.isEmpty(r.logTail)}"
                         style="margin-top: 0.25rem;">
                    <summary style="font-size: 0.75rem; color: var(--color-text-muted); cursor: pointer;">log</summary>
                    <pre style="font-size: 0.7rem; max-height: 200px; overflow: auto; white-space: pre-wrap;"
                         th:text="${r.logTail}"></pre>
                </details>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
