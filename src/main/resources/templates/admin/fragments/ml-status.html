<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="ml-status-card" id="ml-status-card">
    <div class="card" style="margin-top: 0;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <span th:if="${mlStatus.enabled()}"
                      style="display: inline-block; padding: 2px 10px; border-radius: 12px;
                             background: #d1fae5; color: #065f46; font-size: 0.75rem; font-weight: 600;">
                    Enabled
                </span>
                <span th:unless="${mlStatus.enabled()}"
                      style="display: inline-block; padding: 2px 10px; border-radius: 12px;
                             background: #f3f4f6; color: #6b7280; font-size: 0.75rem; font-weight: 600;">
                    Disabled
                </span>
            </div>
            <form th:action="@{/admin/ml/reload}" method="post">
                <button type="submit" class="btn btn--outline btn--sm"
                        hx-post="/admin/ml/reload"
                        hx-target="#ml-status-card"
                        hx-swap="outerHTML">
                    Reload Models
                </button>
            </form>
        </div>

        <table>
            <tbody>
                <tr>
                    <td style="color: var(--color-text-muted); width: 140px;">Version</td>
                    <td th:text="${mlStatus.version() != null ? mlStatus.version() : '—'}">—</td>
                </tr>
                <tr>
                    <td style="color: var(--color-text-muted);">Trained at</td>
                    <td th:text="${mlStatus.trainedAt() != null ? #temporals.format(mlStatus.trainedAt(), 'MMM d yyyy HH:mm') : '—'}">—</td>
                </tr>
                <tr>
                    <td style="color: var(--color-text-muted);">Feature count</td>
                    <td th:text="${mlStatus.featureCount() > 0 ? mlStatus.featureCount() : '—'}">—</td>
                </tr>
                <th:block th:if="${mlStatus.metrics() != null}" th:with="m=${mlStatus.metrics()}">
                    <tr>
                        <td style="color: var(--color-text-muted);">Spread error</td>
                        <td>
                            <span th:text="${m.spreadRmse() != null ? #numbers.formatDecimal(m.spreadRmse(), 1, 2) + ' RMSE' : '—'}">—</span>
                            <span th:if="${m.spreadMae() != null}" style="color: var(--color-text-muted);"
                                  th:text="'· ' + ${#numbers.formatDecimal(m.spreadMae(), 1, 2)} + ' MAE'"></span>
                        </td>
                    </tr>
                    <tr>
                        <td style="color: var(--color-text-muted);">Total error</td>
                        <td>
                            <span th:text="${m.totalRmse() != null ? #numbers.formatDecimal(m.totalRmse(), 1, 2) + ' RMSE' : '—'}">—</span>
                            <span th:if="${m.totalMae() != null}" style="color: var(--color-text-muted);"
                                  th:text="'· ' + ${#numbers.formatDecimal(m.totalMae(), 1, 2)} + ' MAE'"></span>
                        </td>
                    </tr>
                    <tr>
                        <td style="color: var(--color-text-muted);">Win probability</td>
                        <td>
                            <span th:text="${m.brierScore() != null ? #numbers.formatDecimal(m.brierScore(), 1, 4) + ' Brier' : '—'}">—</span>
                            <span th:if="${m.winAccuracy() != null}" style="color: var(--color-text-muted);"
                                  th:text="'· ' + ${#numbers.formatDecimal(m.winAccuracy(), 1, 1)} + '% winners'"></span>
                        </td>
                    </tr>
                    <tr th:if="${m.inSample()}">
                        <td style="color: var(--color-text-muted);">Evaluation</td>
                        <td style="color: #b45309;">In-sample — metrics are optimistic</td>
                    </tr>
                </th:block>
            </tbody>
        </table>

        <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
            <form th:action="@{/admin/ml/train}" method="post">
                <button type="submit" class="btn btn--sm"
                        title="Train new models on the trainer service; on success the models hot-reload and evaluations refresh automatically">
                    Train Models
                </button>
            </form>
            <form th:action="@{/admin/ml/evaluate}" method="post">
                <button type="submit" class="btn btn--outline btn--sm"
                        title="Score every model against results for FINAL games not yet evaluated (runs in background)">
                    Evaluate Predictions
                </button>
            </form>
            <form th:action="@{/admin/ml/evaluate/rebuild}" method="post"
                  onsubmit="return confirm('Delete all evaluation rows and recompute from scratch?');">
                <button type="submit" class="btn btn--outline btn--sm"
                        title="Delete all evaluation rows and recompute every season from scratch">
                    Rebuild Evaluations
                </button>
            </form>
        </div>

        <p style="margin-top: 0.75rem; font-size: 0.8rem; color: var(--color-text-muted);">
            Train Models runs on the trainer container and auto-reloads + re-evaluates on success.
            Shell fallback: <code>./scripts/retrain.sh</code> on the server.
        </p>
    </div>
</div>
</body>
</html>
