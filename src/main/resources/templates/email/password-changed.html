<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, Helvetica, sans-serif; color: #222; max-width: 480px; margin: 0 auto; padding: 24px;">
<h2 style="margin-bottom: 8px;">Your DeepFij password was changed</h2>
<p>Hi <span th:text="${username}">user</span>,</p>
<p>The password for your account was just changed, and any other signed-in sessions were logged out.</p>
<p style="color: #666; font-size: 13px;">If this wasn't you, reset your password immediately using the "Forgot password" link on the sign-in page.</p>
</body>
</html>
