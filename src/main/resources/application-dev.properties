# Development Profile Configuration
spring.application.name=basketball

# PostgreSQL Docker Database Configuration (override via environment variables)
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:basketball_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Throwaway local value for the Netdata role (prod requires NETDATA_DB_PASSWORD, no default)
spring.flyway.placeholders.netdata_password=${NETDATA_DB_PASSWORD:netdata_dev_password}

# Server
server.port=8080

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.yotto.basketball=DEBUG

# Allow non-HTTPS cookies in dev
server.servlet.session.cookie.secure=false

# Thymeleaf - disable template cache so edits are picked up without restart
spring.thymeleaf.cache=false
