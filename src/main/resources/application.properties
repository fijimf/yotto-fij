# Application
spring.application.name=basketball

# Database Configuration (override via environment variables)
# reWriteBatchedInserts: the Postgres driver folds JDBC batches into multi-row INSERTs
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:basketball_db}?reWriteBatchedInserts=true
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080
server.forward-headers-strategy=native

# Monitoring (Actuator + Micrometer -> Prometheus, scraped by Netdata)
# Actuator runs on a separate management port that is never published or proxied publicly.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
# HTTP server request timing with percentile histograms (enables p95/p99)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,2s

# Flyway placeholder for the Netdata monitoring role (V21). Set NETDATA_DB_PASSWORD in .env
# BEFORE the first deploy that runs V21; changing it later requires a manual ALTER ROLE.
spring.flyway.placeholders.netdata_password=${NETDATA_DB_PASSWORD:netdata_dev_password}

# Session security
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax

# Enable hidden HTTP method filter for DELETE/PUT forms
spring.mvc.hiddenmethod.filter.enabled=true

# ML Predictions (Phase 2)
prediction.ml.model-dir=${ML_MODEL_DIR:/models}
prediction.ml.enabled=${ML_ENABLED:true}

# User accounts / email (see docs/USER_SYSTEM_SPEC.md)
# app.mail.enabled=false (the default) logs emails instead of sending — dev/test mode.
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@localhost}
# Canonical base URL for links in emails. NEVER derived from request headers
# (host-header injection would poison password-reset links).
app.base-url=${APP_BASE_URL:http://localhost:8080}
# Backfilled onto the admin account at startup so admin password reset works.
app.security.admin-email=${ADMIN_EMAIL:deppfij@gmail.com}
# Nightly account hygiene: expired tokens, abandoned registrations, old audit rows
app.user-maintenance.cron=0 0 3 * * *

# SMTP (Mailgun) — only used when app.mail.enabled=true
spring.mail.host=${SMTP_HOST:smtp.mailgun.org}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Admin broadcast-email attachments: 10MB total is enforced in the controller;
# these servlet limits are the outer bound (a little headroom for multipart overhead).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ESPN Scraping
espn.scraping.base-delay-ms=200
espn.scraping.jitter-ms=100
espn.scraping.season-start-month=11
espn.scraping.season-start-day=1
espn.scraping.season-end-month=4
espn.scraping.season-end-day=30
espn.scraping.schedule=0 0 */12 * * *
