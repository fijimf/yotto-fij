services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - yotto-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: yotto-app:latest
    expose:
      - "8080"
      - "8081"   # Actuator management port — internal only, scraped by netdata
    restart: unless-stopped
    environment:
      # reWriteBatchedInserts: the Postgres driver folds JDBC batches into multi-row INSERTs
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}?reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      NETDATA_DB_PASSWORD: ${NETDATA_DB_PASSWORD}   # Flyway V21 creates the netdata monitoring role
      ML_MODEL_DIR: /models
      ML_ENABLED: ${ML_ENABLED:-false}
      ML_TRAINER_URL: http://trainer:8000
      # User account system: transactional email (Mailgun SMTP) + emailed-link base URL
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailgun.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      APP_BASE_URL: ${APP_BASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - model_data:/models:ro
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888"
      - "9999:9999"   # netdata dashboard (TLS + basic auth); open in the Hetzner firewall
    restart: unless-stopped
    volumes:
      - ./config/mysite:/etc/nginx/conf.d/default.conf:ro
      - ./config/htpasswd:/etc/nginx/htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
      - goaccess_report:/var/www/goaccess:ro
    depends_on:
      - app
      - netdata

  goaccess:
    image: allinurl/goaccess
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "touch /var/log/nginx/goaccess.log && goaccess /var/log/nginx/goaccess.log --log-format=COMBINED --real-time-html --ws-url=wss://fijimf.com:8888/ws --port=7890 --output=/var/www/goaccess/index.html --no-global-config"
    volumes:
      - nginx_logs:/var/log/nginx
      - goaccess_report:/var/www/goaccess
    depends_on:
      - nginx

  logrotate:
    image: alpine:3.20
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/rotate-logs.sh"]
    volumes:
      - nginx_logs:/var/log/nginx
      - ./scripts/rotate-logs.sh:/rotate-logs.sh:ro

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    hostname: fijimf.com            # node name shown in the netdata UI
    restart: unless-stopped
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    ports:
      - "127.0.0.1:19999:19999"     # LOCAL ONLY — remote access goes through nginx :9999
    environment:
      NETDATA_NTFY_TOPIC_URL: ${NETDATA_NTFY_TOPIC_URL}   # alert push channel (health_alarm_notify.conf)
    volumes:
      # NOTE: no volume on /etc/netdata itself — the image entrypoint tries to copy stock
      # config into it when it's a mountpoint, and dies on our read-only go.d/health.d
      # submounts. Config is declarative via the ./netdata mounts below.
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - ./netdata/go.d:/etc/netdata/go.d:ro
      - ./netdata/health.d:/etc/netdata/health.d:ro
      - ./netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro   # container discovery + names only
      - nginx_logs:/var/log/nginx:ro                   # web_log collector reads access.log

  # ML trainer service — always on, internal network only (never expose/proxy it).
  # The app triggers training via POST http://trainer:8000/train (admin "Train Models"
  # button). One-shot CLI fallback: scripts/retrain.sh (uses --entrypoint python).
  trainer:
    build:
      context: ./scripts
      dockerfile: Dockerfile.trainer
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      ML_MODEL_DIR: /models
    volumes:
      - model_data:/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  yotto-postgres-data:
  model_data:
  nginx_logs:
  goaccess_report:
  netdatalib:
  netdatacache:
