# User override of the stock go.d Docker service-discovery config.
#
# Every collector this deployment needs is defined explicitly as a file job
# (nginx.conf, postgres.conf, prometheus.conf, web_log.conf). The stock Docker
# auto-discovery adds duplicate/guessed jobs on top of those — notably a Postgres
# job using the default DSN `netdata:postgres@<db-ip>/postgres`, which fails
# SCRAM auth and spams the Postgres log with
#   FATAL: password authentication failed for user "netdata"
# on every scrape (the real metrics are already collected by the `local` file job).
#
# Disabling Docker SD removes that noise with no loss of coverage here.
disabled: yes
