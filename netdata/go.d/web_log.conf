# Parse the timed nginx access log (log_format netdata_timing in config/mysite).
# Line shape:
#   1.2.3.4 - user [02/Jul/2026:10:00:00 +0000] "GET / HTTP/1.1" 200 1234 "ref" "ua" rt=0.005 urt=0.004
# urt may be "-" (no upstream) or a comma-separated list on retries.
jobs:
  - name: nginx
    # retry startup failures (e.g. netdata comes up before nginx writes the first line)
    autodetection_retry: 60
    path: /var/log/nginx/access_timed.log
    log_type: regexp
    regexp_config:
      pattern: '^(?P<remote_addr>[^ ]+) - [^ ]+ \[[^\]]+\] "(?P<request>[^"]*)" (?P<status>[0-9]+) (?P<body_bytes_sent>[0-9]+) "[^"]*" "[^"]*" rt=(?P<request_time>[0-9.]+) urt=(?P<upstream_response_time>[^ ]+)$'
