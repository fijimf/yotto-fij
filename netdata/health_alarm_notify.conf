# Netdata notification override — sourced by alarm-notify.sh AFTER the stock defaults,
# so only the deltas live here. Pushes alerts via ntfy (https://ntfy.sh): no account
# needed, install the ntfy app on your phone and subscribe to the topic.
# The topic URL is injected as a container env var (NETDATA_NTFY_TOPIC_URL from .env)
# so the secret-ish topic name is not committed.

SEND_NTFY="YES"
DEFAULT_RECIPIENT_NTFY="${NETDATA_NTFY_TOPIC_URL}"

# The container has no sendmail; the stock default (email to root) just logs an error
# on every alert, so switch it off.
SEND_EMAIL="NO"
