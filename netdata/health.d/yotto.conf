# App-specific health alarms for yotto-fij (spec: docs/monitoring-spec-netdata.md task 6).
# Netdata's stock alarms already cover host CPU/RAM/disk IO/network/OOM; these add the
# site-specific ones. All route to the "sysadmin" role, which health_alarm_notify.conf
# maps to the ntfy topic.
#
# NOTE: the "on:" lines for the go.d prometheus collector are best-effort — after the
# first deploy, verify the exact chart context in the Netdata UI (Alerts -> chart name)
# and adjust if a template stays in "uninitialized" state.

# ---- HTTP 5xx responses on the public site (web_log collector, "error" = 5xx) ----
 template: yotto_web_5xx_5m
       on: web_log.type_requests
   lookup: sum -5m unaligned of error
    units: requests
    every: 1m
     warn: $this > 10
     crit: $this > 60
    delay: down 5m
     info: number of HTTP 5xx responses served in the last 5 minutes
       to: sysadmin

# ---- JVM long-lived heap after GC (Micrometer jvm.memory.usage.after.gc, 0..1) ----
 template: yotto_jvm_heap_after_gc
       on: prometheus.jvm_memory_usage_after_gc
   lookup: average -5m unaligned
    units: fraction
    every: 1m
     warn: $this > 0.90
     crit: $this > 0.98
    delay: down 5m
     info: fraction of the JVM old-gen heap still used after garbage collection (5m avg)
       to: sysadmin

# ---- Postgres connections vs max_connections ----
 template: yotto_pg_connection_utilization
       on: postgres.connections_utilization
   lookup: average -1m unaligned
    units: %
    every: 1m
     warn: $this > 80
     crit: $this > 90
    delay: down 5m
     info: postgres connections in use as a percentage of max_connections
       to: sysadmin

# ---- Disk space (spec thresholds: warn <15% free, crit <5% free) ----
 template: yotto_disk_space_usage
       on: disk.space
     calc: $used * 100 / ($avail + $used)
    units: %
    every: 1m
     warn: $this > 85
     crit: $this > 95
    delay: down 5m
     info: disk space utilization (the postgres volume lives on the root filesystem)
       to: sysadmin
